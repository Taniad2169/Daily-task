            // scrolls back up to the leads/tasks view.
            lessonsBackBtn.addEventListener('click', function() {
                closeLessons();
                if (container) container.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });

            // ===== INIT APP =====
            function initApp() {
                if (appInitialized) return;
                appInitialized = true;

                loadFromStorage();
                loadGeneralComment();
                renderLeads();
                renderTodos();
                renderCompleted();
                renderLanguage();
                renderAiTool();
                wireLanguageAndAiFields();

                document.getElementById('addLeadBtn').addEventListener('click', addLead);
                editToggleBtn.addEventListener('click', toggleEditMode);
                saveEditBtn.addEventListener('click', saveEdit);
                document.getElementById('generalWhatsappBtn').addEventListener('click', sendGeneralWhatsApp);
                document.getElementById('generalSmsBtn').addEventListener('click', sendGeneralSMS);
                document.getElementById('briefingWhatsappBtn').addEventListener('click', sendBriefingWhatsApp);
                document.getElementById('briefingSmsBtn').addEventListener('click', sendBriefingSMS);
                phoneModalCancel.addEventListener('click', closePhoneModal);
                phoneModalConfirm.addEventListener('click', () => {
                    const num = phoneModalInput.value.trim();
                    if (!num) {
                        showToast('Please enter a phone number.', 'error');
                        return;
                    }
                    openSMS(num, pendingModalMessage);
                    closePhoneModal();
                });
                phoneModalInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') phoneModalConfirm.click();
                });
                document.getElementById('globalSaveBtn').addEventListener('click', () => {
                    saveToStorage();
                    showToast('✅ All data saved locally!', 'success');
                });
                document.getElementById('clearDataBtn').addEventListener('click', clearAllData);
                document.getElementById('lockAppBtn').addEventListener('click', lockApp);
                document.getElementById('addTodoBtn').addEventListener('click', addTodo);
                document.getElementById('smsSendBtn').addEventListener('click', sendSMS);
                
                todoInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') addTodo();
                });
                todoInput.addEventListener('input', updateTodoWordCounter);

                generalCommentEl.addEventListener('input', () => {
                    const words = countWords(generalCommentEl.value);
                    if (words > 500) {
                        const truncated = generalCommentEl.value.split(/\s+/).slice(0, 500).join(' ');
                        generalCommentEl.value = truncated;
                    }
                    updateGeneralWordCounter();
                    localStorage.setItem('webswan_general', generalCommentEl.value);
                });

                briefingCommentEl.addEventListener('input', () => {
                    const words = countWords(briefingCommentEl.value);
                    if (words > 5000) {
                        const truncated = briefingCommentEl.value.split(/\s+/).slice(0, 5000).join(' ');
                        briefingCommentEl.value = truncated;
                    }
                    updateBriefingWordCounter();
                    localStorage.setItem('webswan_briefing', briefingCommentEl.value);
                });

                updateTodoWordCounter();
                showToast('🔓 Welcome back, love! 💙', 'success');
            }
        })();
    </script>
</body>
</html>
