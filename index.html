<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>WebSwan · Secure Daily Lead</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #d4edf7 0%, #89c2d9 100%);
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* ----- LOCK SCREEN OVERLAY ----- */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #023e8a 0%, #0077b6 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #lockScreen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }
        .lock-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 3rem 2.5rem;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 90%;
        }
        .lock-emoji {
            font-size: 5rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
        }
        .lock-emoji:active {
            transform: scale(0.9);
        }
        .lock-emoji:hover {
            transform: scale(1.05);
        }
        .lock-title {
            color: white;
            font-size: 1.5rem;
            font-weight: 300;
            margin: 1.5rem 0 0.5rem;
            letter-spacing: 2px;
        }
        .lock-subtitle {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .lock-status {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            min-height: 1.5rem;
        }
        .lock-icon-big {
            font-size: 4rem;
            margin-bottom: 0.5rem;
        }
        #secondLockContainer {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        #secondLockContainer.show {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse {
            animation: pulse 1.5s infinite;
        }
        /* ----- APP (hidden until unlocked) ----- */
        #appContent {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            max-width: 1100px;
            width: 100%;
        }
        #appContent.unlocked {
            opacity: 1;
            pointer-events: all;
        }
        .app-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(6px);
            border-radius: 36px 36px 28px 28px;
            padding: 1.5rem 1.5rem 2rem;
            box-shadow: 0 20px 50px rgba(0, 40, 70, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        /* Header */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 4px solid #0077b6;
            padding-bottom: 1rem;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #023e8a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i {
            color: #00b4d8;
            font-size: 1.8rem;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            background: white;
            border: none;
            padding: 0.55rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #023e8a;
            box-shadow: 0 4px 10px rgba(0, 60, 110, 0.1);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #b8dff0;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn-primary {
            background: #0077b6;
            color: white;
            border: 1px solid #0077b6;
        }
        .btn-primary i {
            color: white;
        }
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: 1px solid #1da85c;
        }
        .btn-whatsapp i {
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #0077b6;
            color: #0077b6;
        }
        .btn-success {
            background: #28a745;
            color: white;
            border: 1px solid #28a745;
        }
        .btn-success i {
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
            border: 1px solid #dc3545;
        }
        .btn-sms {
            background: #ff6b35;
            color: white;
            border: 1px solid #ff6b35;
        }
        .btn-sms i {
            color: white;
        }
        .btn-select {
            background: #f9a825;
            color: white;
            border: 1px solid #f9a825;
        }
        .btn-select i {
            color: white;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 80, 130, 0.2);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-icon-sm {
            padding: 0.35rem 0.8rem;
            font-size: 0.75rem;
        }
        /* Lead Card */
        .lead-card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem 1.5rem 1.2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 6px 16px rgba(0, 60, 100, 0.08);
            border: 1px solid rgba(0, 119, 182, 0.12);
            transition: 0.2s;
        }
        .lead-card:hover {
            border-color: #48b5e4;
        }
        .lead-card.completed {
            opacity: 0.7;
            border-color: #28a745;
            background: #f0fff4;
        }
        .lead-card.completed .lead-actions .btn-complete {
            background: #28a745;
            color: white;
        }
        .lead-card.selectable {
            border: 2px dashed #f9a825;
        }
        .lead-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem 1.2rem;
            align-items: end;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .field-group label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #026aa7;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .field-group input,
        .field-group select,
        .field-group textarea {
            background: #f5faff;
            border: 1.5px solid #d4eaf5;
            border-radius: 20px;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            transition: 0.15s;
            width: 100%;
            color: #034b77;
            -webkit-appearance: none;
            appearance: none;
        }
        .field-group input:focus,
        .field-group select:focus,
        .field-group textarea:focus {
            outline: 3px solid #0077b6;
            background: white;
            border-color: transparent;
        }
        .field-group textarea {
            resize: vertical;
            min-height: 55px;
            border-radius: 18px;
        }
        .field-group input:read-only,
        .field-group textarea:read-only,
        .field-group select:disabled {
            opacity: 0.55;
            background: #eef3f7;
            cursor: not-allowed;
        }
        .comment-box {
            grid-column: 1 / -1;
            margin-top: 4px;
        }
        .comment-box textarea {
            min-height: 65px;
        }
        .lead-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 1rem;
            border-top: 1.5px dashed #b8dff0;
            padding-top: 1rem;
        }
        .lead-actions .btn {
            padding: 0.35rem 1.1rem;
            font-size: 0.78rem;
        }
        /* General Comment */
        .general-comment {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            border: 1px solid rgba(0, 119, 182, 0.12);
        }
        .general-comment label {
            font-weight: 700;
            color: #023e8a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .general-comment textarea {
            width: 100%;
            border: 1.5px solid #d4eaf5;
            border-radius: 24px;
            padding: 1rem;
            font-size: 0.95rem;
            background: #f5faff;
            min-height: 100px;
            margin-top: 10px;
        }
        .general-comment textarea:focus {
            outline: 3px solid #0077b6;
            background: white;
        }
        .footer-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .editing {
            outline: 3px solid #f9a825;
            outline-offset: 2px;
            background: #fffdf0;
        }
        .word-counter {
            font-size: 0.7rem;
            color: #2c7da0;
            text-align: right;
            margin-top: 2px;
            padding-right: 6px;
        }
        /* Completed Tasks */
        .completed-section {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            border: 2px solid #28a745;
        }
        .completed-section h3 {
            color: #28a745;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
        }
        .completed-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: #f8fff8;
            border-radius: 12px;
            margin-bottom: 6px;
            border-left: 4px solid #28a745;
        }
        .completed-item i {
            color: #28a745;
            font-size: 1.1rem;
        }
        .completed-item .item-text {
            flex: 1;
            font-size: 0.9rem;
            color: #2d3748;
        }
        .completed-item .item-type {
            font-size: 0.7rem;
            color: #718096;
            background: #edf2f7;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .completed-empty {
            color: #a0aec0;
            font-style: italic;
            text-align: center;
            padding: 1rem;
        }
        .general-send-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 1.2rem;
            padding-top: 1rem;
            border-top: 1.5px dashed #cdeee0;
            flex-wrap: wrap;
        }
        /* To-Do Section */
        .todo-section {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            border: 1px solid rgba(0, 119, 182, 0.12);
        }
        .todo-section h3 {
            color: #023e8a;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
        }
        .todo-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            background: #f7fafc;
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .todo-item.completed-todo {
            opacity: 0.6;
            background: #f0fff4;
            border-color: #28a745;
        }
        .todo-item.selectable {
            border: 2px dashed #f9a825;
        }
        .todo-item.editing {
            outline: 3px solid #f9a825;
            outline-offset: 1px;
            background: #fffdf0;
        }
        .todo-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 3px;
            cursor: pointer;
            accent-color: #28a745;
        }
        .todo-item .todo-text {
            flex: 1;
            font-size: 0.95rem;
            color: #2d3748;
            min-width: 140px;
        }
        .todo-item .todo-text.done {
            text-decoration: line-through;
            color: #a0aec0;
        }
        .todo-item .todo-delete {
            background: none;
            border: none;
            color: #fc8181;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 5px;
        }
        .todo-item .todo-delete:hover {
            color: #e53e3e;
        }
        .todo-item .todo-send-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .todo-input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .todo-input-group input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1.5px solid #d4eaf5;
            border-radius: 20px;
            font-size: 0.9rem;
            background: #f5faff;
        }
        .todo-input-group input:focus {
            outline: 3px solid #0077b6;
            border-color: transparent;
        }
        /* Mobile */
        @media (max-width: 640px) {
            .app-container {
                padding: 1rem;
                border-radius: 24px;
            }
            .header h1 {
                font-size: 1.4rem;
            }
            .lead-grid {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
            .btn {
                padding: 0.45rem 0.9rem;
                font-size: 0.8rem;
            }
            .header-actions .btn {
                font-size: 0.7rem;
                padding: 0.4rem 0.8rem;
            }
            .lock-container {
                padding: 2rem 1.5rem;
            }
            .lock-emoji {
                font-size: 4rem;
            }
            .todo-input-group {
                flex-direction: column;
            }
        }
        @media (max-width: 400px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .header-actions {
                justify-content: stretch;
            }
            .header-actions .btn {
                flex: 1;
                justify-content: center;
                font-size: 0.7rem;
            }
        }
        i.fa-whatsapp {
            color: #25D366;
        }
        .btn-whatsapp i.fa-whatsapp {
            color: white;
        }
        .shake {
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-15px); }
            40% { transform: translateX(15px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a202c;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 99999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 90%;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            border-left: 5px solid #28a745;
        }
        .toast.error {
            border-left: 5px solid #dc3545;
        }
        /* ===== LESSONS TOGGLE ===== */
        .lessons-wrapper {
            margin-top: 1.5rem;
            border-top: 2px solid #eef2f7;
            padding-top: 1.5rem;
        }
        .lessons-content {
            display: none;
            background: #f8faff;
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid #e0e4ea;
            margin-top: 1rem;
        }
        .lessons-content.open {
            display: block;
        }
        .lessons-back-row {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 1rem;
        }
        .lesson-item {
            padding: 12px 0;
            border-bottom: 1px solid #eef2f7;
        }
        .lesson-item:last-child {
            border-bottom: none;
        }
        .lesson-item h3 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .lesson-item p {
            font-size: 14px;
            color: #555;
        }
        .btn-lessons {
            background: #023e8a;
            color: white;
            border: 1px solid #023e8a;
        }
        .btn-lessons i {
            color: white;
        }
        .btn-lessons.active {
            background: #28a745;
            border-color: #28a745;
        }
        /* ===== PHONE NUMBER MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 20, 40, 0.55);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100000;
            padding: 1rem;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 28px;
            padding: 1.8rem;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 40, 70, 0.35);
        }
        .modal-box h3 {
            color: #023e8a;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-box input {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid #d4eaf5;
            border-radius: 20px;
            font-size: 0.95rem;
            background: #f5faff;
            margin-bottom: 1.2rem;
        }
        .modal-box input:focus {
            outline: 3px solid #0077b6;
            background: white;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
    </style>
</head>
<body>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- ===== LOCK SCREEN ===== -->
    <div id="lockScreen">
        <div class="lock-container">
            <!-- First Lock: 🔐 -->
            <div id="firstLockContainer">
                <div class="lock-icon-big">🔐</div>
                <div class="lock-emoji" id="firstLockEmoji">🔐</div>
                <div class="lock-title">Secure Vault</div>
                <div class="lock-subtitle">🔒</div>
                <div class="lock-status" id="firstLockStatus">🔒</div>
            </div>

            <!-- Second Lock: 🗝️ (hidden initially) -->
            <div id="secondLockContainer">
                <div class="lock-icon-big">🗝️</div>
                <div class="lock-emoji" id="secondLockEmoji">🗝️</div>
                <div class="lock-title">Final Key</div>
                <div class="lock-subtitle">🗝️</div>
                <div class="lock-status" id="secondLockStatus">🗝️</div>
            </div>
        </div>
    </div>

    <!-- ===== APP CONTENT (hidden until unlocked) ===== -->
    <div id="appContent">
        <div class="app-container">
            <!-- Header -->
            <div class="header">
                <h1><i class="fas fa-feather-alt"></i> WebSwan <span style="font-weight:300;color:#0077b6;">·</span> Daily</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" id="addLeadBtn"><i class="fas fa-plus-circle"></i> Add</button>
                    <button class="btn btn-outline" id="editToggleBtn"><i class="fas fa-pen"></i> Edit</button>
                    <button class="btn btn-success" id="saveEditBtn" disabled><i class="fas fa-save"></i> Save Edit</button>
                    <button class="btn btn-lessons" id="toggleLessonsBtn"><i class="fas fa-book"></i> Lessons</button>
                </div>
            </div>

            <!-- Lessons Content (hidden by default) -->
            <div class="lessons-wrapper">
                <div id="lessonsContent" class="lessons-content">
                    <div class="lessons-back-row">
                        <button class="btn btn-outline" id="lessonsBackBtn"><i class="fas fa-arrow-left"></i> Back to Tasks</button>
                    </div>
                    <div class="field-group" style="margin-bottom:1.5rem;">
                        <label><i class="fas fa-language"></i> Language</label>
                        <select id="languageSelect">
                            <option value="Brazilian">Brazilian</option>
                            <option value="Italian">Italian</option>
                            <option value="French">French</option>
                            <option value="Spanish">Spanish</option>
                            <option value="English">English</option>
                        </select>
                        <label style="margin-top:10px;"><i class="fas fa-comment"></i> Language notes</label>
                        <textarea id="languageComment" style="min-height:80px;"></textarea>
                        <div class="word-counter" id="languageWordCount">0 / 1000 words</div>
                    </div>

                    <div class="field-group">
                        <label><i class="fas fa-robot"></i> AI File</label>
                        <select id="aiToolSelect">
                            <option>Claude AI</option>
                            <option>DeepSeek</option>
                            <option>ChatGPT</option>
                            <option>Gemini</option>
                            <option>OpenClaws</option>
                            <option>Lovable</option>
                            <option>Microsoft Copilot</option>
                            <option>GitHub Copilot</option>
                            <option>HeyGen</option>
                        </select>
                        <label style="margin-top:10px;"><i class="fas fa-sliders-h"></i> Type</label>
                        <select id="aiCategorySelect">
                            <option>Prompts</option>
                            <option>Settings</option>
                            <option>Instructions</option>
                        </select>
                        <label style="margin-top:10px;"><i class="fas fa-comment"></i> Notes</label>
                        <textarea id="aiComment" style="min-height:100px;"></textarea>
                        <div class="word-counter" id="aiWordCount">0 / 1500 words</div>
                        <div style="margin-top:10px;">
                            <button class="btn btn-whatsapp" id="aiWhatsappBtn"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Leads Container (Clients / Prospects) -->
            <div id="leadsContainer"></div>

            <!-- To-Do Section -->
            <div class="todo-section">
                <h3><i class="fas fa-tasks" style="color:#0077b6;"></i> Personal To-Do <span style="font-weight:400;font-size:0.75rem;color:#2c7da0;">(250 words max)</span></h3>
                <div id="todoContainer"></div>
                <div class="todo-input-group">
                    <input type="text" id="todoInput" maxlength="250" />
                    <button class="btn btn-primary" id="addTodoBtn"><i class="fas fa-plus"></i> Add</button>
                </div>
                <div class="word-counter" id="todoWordCount">0 / 250 words</div>
            </div>

            <!-- Completed Tasks -->
            <div class="completed-section">
                <h3><i class="fas fa-check-circle"></i> Completed Tasks</h3>
                <div id="completedContainer">
                    <div class="completed-empty">No completed tasks yet. Complete a lead or a to-do to see them here! ✅</div>
                </div>
                <div class="general-send-row">
                    <button class="btn btn-whatsapp" id="generalWhatsappBtn"><i class="fab fa-whatsapp"></i> General WhatsApp</button>
                    <button class="btn btn-sms" id="generalSmsBtn"><i class="fas fa-sms"></i> General SMS</button>
                </div>
            </div>

            <!-- General Comment -->
            <div class="general-comment" id="generalCommentBox">
                <label><i class="fas fa-sticky-note" style="color:#0077b6;"></i> Daily general comment <span style="font-weight:400;font-size:0.75rem;color:#2c7da0;">(max 500 words)</span></label>
                <textarea id="generalComment" maxlength="3000"></textarea>
                <div class="word-counter" id="generalWordCount">0 / 500 words</div>
            </div>

            <!-- Briefing -->
            <div class="general-comment" id="briefingBox">
                <label><i class="fas fa-file-alt" style="color:#0077b6;"></i> Briefing <span style="font-weight:400;font-size:0.75rem;color:#2c7da0;">(max 5000 words)</span></label>
                <textarea id="briefingComment" style="min-height:160px;"></textarea>
                <div class="word-counter" id="briefingWordCount">0 / 5000 words</div>
                <div class="general-send-row">
                    <button class="btn btn-whatsapp" id="briefingWhatsappBtn"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                    <button class="btn btn-sms" id="briefingSmsBtn"><i class="fas fa-sms"></i> SMS</button>
                </div>
            </div>

            <!-- Bottom Actions -->
            <div class="footer-bar">
                <button class="btn btn-primary" id="globalSaveBtn"><i class="fas fa-save"></i> Save all</button>
                <button class="btn btn-sms" id="smsSendBtn"><i class="fas fa-sms"></i> Send to 415-877-0687</button>
                <button class="btn btn-outline" id="clearDataBtn" style="border-color:#e74c3c;color:#e74c3c;"><i class="fas fa-trash"></i> Clear</button>
                <button class="btn btn-outline" id="lockAppBtn" style="border-color:#0077b6;"><i class="fas fa-lock"></i> Lock</button>
            </div>
        </div>
    </div>

    <!-- Phone Number Entry Modal (used for manual SMS number entry) -->
    <div id="phoneModalOverlay" class="modal-overlay">
        <div class="modal-box">
            <h3><i class="fas fa-phone"></i> Enter phone number</h3>
            <input type="tel" id="phoneModalInput" />
            <div class="modal-actions">
                <button class="btn btn-outline" id="phoneModalCancel">Cancel</button>
                <button class="btn btn-sms" id="phoneModalConfirm"><i class="fas fa-sms"></i> Send SMS</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ===== TOAST SYSTEM =====
            function showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.className = 'toast ' + type + ' show';
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3500);
            }

            // ===== LOCK SYSTEM =====
            let firstLockClicks = 0;
            let secondLockClicks = 0;
            let isUnlocked = false;

            const lockScreen = document.getElementById('lockScreen');
            const appContent = document.getElementById('appContent');
            const firstLockContainer = document.getElementById('firstLockContainer');
            const secondLockContainer = document.getElementById('secondLockContainer');
            const firstLockEmoji = document.getElementById('firstLockEmoji');
            const secondLockEmoji = document.getElementById('secondLockEmoji');
            const firstLockStatus = document.getElementById('firstLockStatus');
            const secondLockStatus = document.getElementById('secondLockStatus');

            function resetFirstLock() {
                firstLockClicks = 0;
                firstLockStatus.textContent = '🔒';
                firstLockStatus.style.color = 'rgba(255,255,255,0.4)';
                firstLockEmoji.classList.remove('shake');
            }

            function resetSecondLock() {
                secondLockClicks = 0;
                secondLockStatus.textContent = '🗝️';
                secondLockStatus.style.color = 'rgba(255,255,255,0.4)';
                secondLockEmoji.classList.remove('shake');
            }

            firstLockEmoji.addEventListener('click', function(e) {
                e.stopPropagation();
                if (isUnlocked) return;
                if (firstLockClicks >= 7) return;

                firstLockClicks++;
                
                if (firstLockClicks < 7) {
                    firstLockStatus.textContent = `🔐`;
                    firstLockStatus.style.color = '#ffd700';
                }

                if (firstLockClicks === 7) {
                    firstLockStatus.textContent = '✅';
                    firstLockStatus.style.color = '#00ff88';
                    firstLockStatus.style.fontWeight = 'bold';

                    setTimeout(() => {
                        firstLockContainer.style.display = 'none';
                        secondLockContainer.classList.add('show');
                        secondLockContainer.style.display = 'block';
                        secondLockContainer.style.animation = 'fadeIn 0.6s ease';
                        resetSecondLock();
                    }, 400);
                }
            });

            secondLockEmoji.addEventListener('click', function(e) {
                e.stopPropagation();
                if (isUnlocked) return;
                if (secondLockClicks >= 3) return;

                secondLockClicks++;
                
                if (secondLockClicks < 3) {
                    secondLockStatus.textContent = `🗝️`;
                    secondLockStatus.style.color = '#ffd700';
                }

                if (secondLockClicks === 3) {
                    secondLockStatus.textContent = '🔓';
                    secondLockStatus.style.color = '#00ff88';
                    secondLockStatus.style.fontWeight = 'bold';
                    secondLockEmoji.classList.add('pulse');

                    setTimeout(() => {
                        isUnlocked = true;
                        lockScreen.classList.add('hidden');
                        appContent.classList.add('unlocked');
                        initApp();
                    }, 600);
                }
            });

            // ===== APP LOGIC =====
            let leads = [];
            let todos = [];
            let completedItems = [];
            let nextId = 1;
            let nextTodoId = 1;
            let editMode = false;              // true = user clicked "Edit", waiting to pick an item
            let selectedKey = null;             // e.g. "lead-3" or "todo-5" — the one unlocked item
            let appInitialized = false;

            const container = document.getElementById('leadsContainer');
            const todoContainer = document.getElementById('todoContainer');
            const completedContainer = document.getElementById('completedContainer');
            const generalCommentEl = document.getElementById('generalComment');
            const generalWordCount = document.getElementById('generalWordCount');
            const briefingCommentEl = document.getElementById('briefingComment');
            const briefingWordCount = document.getElementById('briefingWordCount');
            const todoInput = document.getElementById('todoInput');
            const todoWordCount = document.getElementById('todoWordCount');
            const editToggleBtn = document.getElementById('editToggleBtn');
            const saveEditBtn = document.getElementById('saveEditBtn');

            const OWNER_PHONE = '4158770687';
            const ACTION_OPTIONS = ['re send email', 'call back', 'call', 'send report', 'send demo', 'other'];
            const AI_TOOLS = ['Claude AI', 'DeepSeek', 'ChatGPT', 'Gemini', 'OpenClaws', 'Lovable', 'Microsoft Copilot', 'GitHub Copilot', 'HeyGen'];
            const AI_CATEGORIES = ['Prompts', 'Settings', 'Instructions'];

            // ----- LANGUAGE + AI FILE STATE (Lessons panel) -----
            let languageData = { lang: 'English', comment: '' };
            let aiData = {};            // { 'Claude AI': { category: 'Prompts', comment: '' }, ... }
            let currentAiTool = AI_TOOLS[0];

            function countWords(text) {
                if (!text) return 0;
                return text.trim().split(/\s+/).filter(w => w.length > 0).length;
            }

            function updateGeneralWordCounter() {
                const words = countWords(generalCommentEl.value);
                generalWordCount.textContent = `${words} / 500 words`;
                generalWordCount.style.color = words > 500 ? '#b22222' : '#2c7da0';
            }

            function updateBriefingWordCounter() {
                const words = countWords(briefingCommentEl.value);
                briefingWordCount.textContent = `${words} / 5000 words`;
                briefingWordCount.style.color = words > 5000 ? '#b22222' : '#2c7da0';
            }

            function updateTodoWordCounter() {
                const words = countWords(todoInput.value);
                todoWordCount.textContent = `${words} / 250 words`;
                todoWordCount.style.color = words > 250 ? '#b22222' : '#2c7da0';
            }

            // ----- STORAGE -----
            function loadFromStorage() {
                try {
                    const storedLeads = localStorage.getItem('webswan_leads');
                    if (storedLeads) {
                        leads = JSON.parse(storedLeads);
                        let maxId = 0;
                        leads.forEach(l => { if (l.id && l.id > maxId) maxId = l.id; });
                        nextId = maxId + 1;
                    } else {
                        leads = [
                            { id: nextId++, name: 'Alice Johnson', email: 'alice@techvibe.io', phone: '+1 555 123 4567', address: '', url: 'https://techvibe.io', dropdown: 'call back', comment: 'Interested in API integration.', customDropdown: '', completed: false },
                            { id: nextId++, name: 'Bob Chen', email: 'bob@greenleaf.eco', phone: '+1 555 987 6543', address: '', url: 'https://greenleaf.eco', dropdown: 'send report', comment: 'Sent proposal, waiting for reply.', customDropdown: '', completed: false }
                        ];
                    }
                    // Backfill new fields for leads saved under the old schema (company -> address)
                    leads = leads.map(l => ({
                        ...l,
                        address: l.address !== undefined ? l.address : (l.company || ''),
                        customDropdown: l.customDropdown || '',
                        completed: l.completed || false
                    }));

                    const storedTodos = localStorage.getItem('webswan_todos');
                    if (storedTodos) {
                        todos = JSON.parse(storedTodos);
                        let maxTodoId = 0;
                        todos.forEach(t => { if (t.id && t.id > maxTodoId) maxTodoId = t.id; });
                        nextTodoId = maxTodoId + 1;
                    } else {
                        todos = [];
                        nextTodoId = 1;
                    }

                    const storedCompleted = localStorage.getItem('webswan_completed');
                    if (storedCompleted) {
                        completedItems = JSON.parse(storedCompleted);
                    } else {
                        completedItems = [];
                    }

                    const storedLanguage = localStorage.getItem('webswan_language');
                    languageData = storedLanguage ? JSON.parse(storedLanguage) : { lang: 'English', comment: '' };

                    const storedAiData = localStorage.getItem('webswan_aidata');
                    aiData = storedAiData ? JSON.parse(storedAiData) : {};
                    AI_TOOLS.forEach(tool => {
                        if (!aiData[tool]) aiData[tool] = { category: 'Prompts', comment: '' };
                    });

                    const storedAiTool = localStorage.getItem('webswan_aitool_selected');
                    currentAiTool = (storedAiTool && AI_TOOLS.includes(storedAiTool)) ? storedAiTool : AI_TOOLS[0];
                } catch(e) {
                    leads = [];
                    todos = [];
                    completedItems = [];
                    languageData = { lang: 'English', comment: '' };
                    aiData = {};
                    AI_TOOLS.forEach(tool => { aiData[tool] = { category: 'Prompts', comment: '' }; });
                    currentAiTool = AI_TOOLS[0];
                }
            }

            function saveToStorage() {
                localStorage.setItem('webswan_leads', JSON.stringify(leads));
                localStorage.setItem('webswan_todos', JSON.stringify(todos));
                localStorage.setItem('webswan_completed', JSON.stringify(completedItems));
                localStorage.setItem('webswan_general', generalCommentEl.value);
                localStorage.setItem('webswan_briefing', briefingCommentEl.value);
                localStorage.setItem('webswan_language', JSON.stringify(languageData));
                localStorage.setItem('webswan_aidata', JSON.stringify(aiData));
                localStorage.setItem('webswan_aitool_selected', currentAiTool);
            }

            function loadGeneralComment() {
                const saved = localStorage.getItem('webswan_general');
                if (saved !== null) {
                    generalCommentEl.value = saved;
                }
                updateGeneralWordCounter();

                const savedBriefing = localStorage.getItem('webswan_briefing');
                if (savedBriefing !== null) {
                    briefingCommentEl.value = savedBriefing;
                }
                updateBriefingWordCounter();
            }

            // ----- EDIT MODE HELPERS -----
            // A field is unlocked only when editMode is on AND this exact item is the selectedKey.
            function isUnlockedFor(key) {
                return editMode && selectedKey === key;
            }

            function selectForEdit(key) {
                selectedKey = key;
                saveEditBtn.disabled = false;
                renderLeads();
                renderTodos();
                showToast('✏️ Selected — edit it, then hit Save Edit', 'success');
            }

            function exitEditMode(didSave) {
                editMode = false;
                selectedKey = null;
                editToggleBtn.innerHTML = '<i class="fas fa-pen"></i> Edit';
                saveEditBtn.disabled = true;
                renderLeads();
                renderTodos();
                if (didSave) showToast('✅ Changes saved!', 'success');
            }

            function toggleEditMode() {
                if (editMode) {
                    // cancel out of edit mode without forcing a save
                    exitEditMode(false);
                } else {
                    editMode = true;
                    selectedKey = null;
                    editToggleBtn.innerHTML = '<i class="fas fa-pen-fancy"></i> Choose one…';
                    saveEditBtn.disabled = true;
                    renderLeads();
                    renderTodos();
                    showToast('👉 Tap a lead or task to edit it', 'success');
                }
            }

            // Logs the finished lead into Completed Tasks, then wipes its fields
            // back to blank so the same card is ready for the next lead's data.
            function commitAndResetLead(lead) {
                completedItems.push({
                    id: Date.now(),
                    type: 'lead',
                    text: `${lead.name || 'Unnamed lead'} - ${lead.address || 'No address'} (${lead.phone || 'No phone'})`,
                    leadId: lead.id,
                    timestamp: new Date().toLocaleString()
                });
                lead.name = '';
                lead.phone = '';
                lead.email = '';
                lead.address = '';
                lead.url = '';
                lead.dropdown = 're send email';
                lead.customDropdown = '';
                lead.comment = '';
                lead.completed = false;
            }

            // Logs the finished personal task into Completed Tasks, then clears
            // its text field so it's ready for the next task.
            function commitAndResetTodo(todo) {
                completedItems.push({
                    id: Date.now(),
                    type: 'todo',
                    text: todo.text,
                    todoId: todo.id,
                    timestamp: new Date().toLocaleString()
                });
                todo.text = '';
                todo.completed = false;
            }

            function saveEdit() {
                if (selectedKey && selectedKey.startsWith('lead-')) {
                    const id = parseInt(selectedKey.slice(5), 10);
                    const lead = leads.find(l => l.id === id);
                    if (lead) commitAndResetLead(lead);
                } else if (selectedKey && selectedKey.startsWith('todo-')) {
                    const id = parseInt(selectedKey.slice(5), 10);
                    const todo = todos.find(t => t.id === id);
                    if (todo) commitAndResetTodo(todo);
                }
                saveToStorage();
                renderLeads();
                renderTodos();
                renderCompleted();
                showToast('✅ Logged to Completed — fields cleared for the next one!', 'success');
                // Edit mode + selection stay active so you can keep entering data
                // straight into the same (now blank) card without re-selecting it.
            }

            // ----- RENDER LEADS -----
            function renderLeads() {
                if (!container) return;
                container.innerHTML = '';
                leads.forEach((lead) => {
                    const key = 'lead-' + lead.id;
                    const unlocked = isUnlockedFor(key);

                    const card = document.createElement('div');
                    card.className = 'lead-card';
                    if (lead.completed) card.classList.add('completed');
                    if (unlocked) card.classList.add('editing');
                    if (editMode && !unlocked) card.classList.add('selectable');
                    card.dataset.leadId = lead.id;

                    const grid = document.createElement('div');
                    grid.className = 'lead-grid';

                    grid.appendChild(createField('Name', 'text', lead.name, unlocked, (val) => { lead.name = val; }));
                    grid.appendChild(createField('Phone', 'tel', lead.phone, unlocked, (val) => { lead.phone = val; }));
                    grid.appendChild(createField('Email', 'email', lead.email, unlocked, (val) => { lead.email = val; }));
                    grid.appendChild(createField('Address', 'text', lead.address, unlocked, (val) => { lead.address = val; }));
                    grid.appendChild(createField('URL', 'url', lead.url, unlocked, (val) => { lead.url = val; }));

                    const comboWrapper = document.createElement('div');
                    comboWrapper.className = 'field-group';
                    const combo = document.createElement('div');
                    combo.style.display = 'flex';
                    combo.style.flexDirection = 'column';
                    combo.style.gap = '6px';

                    const label = document.createElement('label');
                    label.innerHTML = '<i class="fas fa-caret-down"></i> Action';
                    const select = document.createElement('select');
                    ACTION_OPTIONS.forEach(opt => {
                        const op = document.createElement('option');
                        op.value = opt;
                        op.textContent = opt.charAt(0).toUpperCase() + opt.slice(1);
                        if (lead.dropdown === opt) op.selected = true;
                        select.appendChild(op);
                    });
                    select.addEventListener('change', (e) => {
                        lead.dropdown = e.target.value;
                        saveToStorage();
                    });

                    const customLabel = document.createElement('label');
                    customLabel.innerHTML = '<i class="fas fa-edit"></i> Custom note';
                    const customInput = document.createElement('textarea');
                    customInput.style.minHeight = '46px';
                    customInput.value = lead.customDropdown || '';
                    const customCounter = document.createElement('div');
                    customCounter.className = 'word-counter';

                    function updateCustomCounter() {
                        const words = countWords(customInput.value);
                        customCounter.textContent = `${words} / 50 words`;
                        customCounter.style.color = words > 50 ? '#b22222' : '#2c7da0';
                    }
                    customInput.addEventListener('input', (e) => {
                        let words = e.target.value.trim().split(/\s+/).filter(w => w.length > 0);
                        if (words.length > 50) {
                            e.target.value = words.slice(0, 50).join(' ');
                        }
                        lead.customDropdown = e.target.value;
                        saveToStorage();
                        updateCustomCounter();
                    });
                    updateCustomCounter();

                    combo.appendChild(label);
                    combo.appendChild(select);
                    combo.appendChild(customLabel);
                    combo.appendChild(customInput);
                    combo.appendChild(customCounter);
                    comboWrapper.appendChild(combo);
                    grid.appendChild(comboWrapper);

                    const commentGroup = document.createElement('div');
                    commentGroup.className = 'field-group comment-box';
                    const commentLabel = document.createElement('label');
                    commentLabel.innerHTML = '<i class="fas fa-comment"></i> Lead comment (200 words)';
                    const textarea = document.createElement('textarea');
                    textarea.value = lead.comment || '';
                    const wordCounter = document.createElement('div');
                    wordCounter.className = 'word-counter';

                    function updateLeadWordCounter() {
                        const words = countWords(textarea.value);
                        wordCounter.textContent = `${words} / 200 words`;
                        wordCounter.style.color = words > 200 ? '#b22222' : '#2c7da0';
                    }
                    textarea.addEventListener('input', () => {
                        let words = textarea.value.trim().split(/\s+/).filter(w => w.length > 0);
                        if (words.length > 200) {
                            textarea.value = words.slice(0, 200).join(' ');
                        }
                        lead.comment = textarea.value;
                        saveToStorage();
                        updateLeadWordCounter();
                    });
                    updateLeadWordCounter();

                    commentGroup.appendChild(commentLabel);
                    commentGroup.appendChild(textarea);
                    commentGroup.appendChild(wordCounter);
                    grid.appendChild(commentGroup);

                    card.appendChild(grid);

                    const actions = document.createElement('div');
                    actions.className = 'lead-actions';

                    const completeBtn = document.createElement('button');
                    completeBtn.className = 'btn btn-success btn-complete';
                    completeBtn.innerHTML = lead.completed ? '<i class="fas fa-undo"></i> Undo' : '<i class="fas fa-check"></i> Complete';
                    completeBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleLeadComplete(lead.id);
                    });

                    const waBtn = document.createElement('button');
                    waBtn.className = 'btn btn-whatsapp btn-icon-sm';
                    waBtn.innerHTML = '<i class="fab fa-whatsapp"></i> WhatsApp';
                    waBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        sendLeadWhatsApp(lead.id);
                    });

                    const smsBtn = document.createElement('button');
                    smsBtn.className = 'btn btn-sms btn-icon-sm';
                    smsBtn.innerHTML = '<i class="fas fa-sms"></i> SMS';
                    smsBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        sendLeadSMS(lead.id);
                    });

                    actions.appendChild(completeBtn);
                    actions.appendChild(waBtn);
                    actions.appendChild(smsBtn);

                    if (editMode) {
                        const selectBtn = document.createElement('button');
                        selectBtn.className = 'btn btn-select';
                        if (unlocked) {
                            selectBtn.innerHTML = '<i class="fas fa-pen-fancy"></i> Editing…';
                            selectBtn.disabled = true;
                        } else {
                            selectBtn.innerHTML = '<i class="fas fa-hand-pointer"></i> Select to Edit';
                        }
                        selectBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            selectForEdit(key);
                        });
                        actions.appendChild(selectBtn);
                    }

                    card.appendChild(actions);
                    container.appendChild(card);
                });
            }

            function createField(labelText, type, value, unlocked, onChange) {
                const div = document.createElement('div');
                div.className = 'field-group';
                const label = document.createElement('label');
                label.textContent = labelText;
                const input = document.createElement('input');
                input.type = type;
                input.value = value || '';
                input.addEventListener('input', (e) => {
                    onChange(e.target.value);
                    saveToStorage();
                });
                div.appendChild(label);
                div.appendChild(input);
                return div;
            }

            // ----- TOGGLE LEAD COMPLETE -----
            function toggleLeadComplete(leadId) {
                const lead = leads.find(l => l.id === leadId);
                if (!lead) return;

                if (!lead.completed) {
                    lead.completed = true;
                    completedItems.push({
                        id: Date.now(),
                        type: 'lead',
                        text: `${lead.name || 'Unnamed lead'} - ${lead.address || 'No address'} (${lead.phone || 'No phone'})`,
                        leadId: lead.id,
                        timestamp: new Date().toLocaleString()
                    });
                    showToast('✅ Lead completed!', 'success');
                } else {
                    lead.completed = false;
                    completedItems = completedItems.filter(item => item.leadId !== lead.id);
                    showToast('↩️ Lead undone', 'success');
                }

                saveToStorage();
                renderLeads();
                renderCompleted();
                renderTodos();
            }

            // ----- RENDER TODOS -----
            function renderTodos() {
                if (!todoContainer) return;
                todoContainer.innerHTML = '';
                if (todos.length === 0) {
                    todoContainer.innerHTML = '<div style="color:#a0aec0;font-style:italic;padding:0.5rem;">No personal tasks yet. Add one below! 📝</div>';
                    return;
                }

                todos.forEach((todo) => {
                    const key = 'todo-' + todo.id;
                    const unlocked = isUnlockedFor(key);

                    const div = document.createElement('div');
                    div.className = 'todo-item';
                    if (todo.completed) div.classList.add('completed-todo');
                    if (unlocked) div.classList.add('editing');
                    if (editMode && !unlocked) div.classList.add('selectable');

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = todo.completed || false;
                    checkbox.addEventListener('change', () => {
                        toggleTodoComplete(todo.id);
                    });

                    const textSpan = document.createElement('span');
                    textSpan.className = 'todo-text';
                    if (todo.completed) textSpan.classList.add('done');

                    const editInput = document.createElement('input');
                    editInput.type = 'text';
                    editInput.value = todo.text;
                    editInput.maxLength = 250;
                    editInput.style.width = '100%';
                    editInput.style.padding = '0.4rem 0.8rem';
                    editInput.style.border = '1.5px solid #d4eaf5';
                    editInput.style.borderRadius = '14px';
                    editInput.addEventListener('input', (e) => {
                        todo.text = e.target.value;
                        saveToStorage();
                    });
                    textSpan.appendChild(editInput);

                    const sendActions = document.createElement('div');
                    sendActions.className = 'todo-send-actions';

                    const waBtn = document.createElement('button');
                    waBtn.className = 'btn btn-whatsapp btn-icon-sm';
                    waBtn.innerHTML = '<i class="fab fa-whatsapp"></i>';
                    waBtn.title = 'Send this task via WhatsApp';
                    waBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        sendTodoWhatsApp(todo.id);
                    });

                    const smsBtn = document.createElement('button');
                    smsBtn.className = 'btn btn-sms btn-icon-sm';
                    smsBtn.innerHTML = '<i class="fas fa-sms"></i>';
                    smsBtn.title = 'Send this task via SMS';
                    smsBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        sendTodoSMS(todo.id);
                    });

                    sendActions.appendChild(waBtn);
                    sendActions.appendChild(smsBtn);

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'todo-delete';
                    deleteBtn.innerHTML = '<i class="fas fa-times"></i>';
                    deleteBtn.addEventListener('click', () => {
                        deleteTodo(todo.id);
                    });

                    div.appendChild(checkbox);
                    div.appendChild(textSpan);
                    div.appendChild(sendActions);

                    if (editMode) {
                        const selectBtn = document.createElement('button');
                        selectBtn.className = 'btn btn-select btn-icon-sm';
                        if (unlocked) {
                            selectBtn.innerHTML = '<i class="fas fa-pen-fancy"></i> Editing…';
                            selectBtn.disabled = true;
                        } else {
                            selectBtn.innerHTML = '<i class="fas fa-hand-pointer"></i> Select';
                        }
                        selectBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            selectForEdit(key);
                        });
                        div.appendChild(selectBtn);
                    }

                    div.appendChild(deleteBtn);
                    todoContainer.appendChild(div);
                });
            }

            // ----- TOGGLE TODO COMPLETE -----
            function toggleTodoComplete(todoId) {
                const todo = todos.find(t => t.id === todoId);
                if (!todo) return;

                if (!todo.completed) {
                    todo.completed = true;
                    completedItems.push({
                        id: Date.now(),
                        type: 'todo',
                        text: todo.text,
                        todoId: todo.id,
                        timestamp: new Date().toLocaleString()
                    });
                    showToast('✅ Task completed!', 'success');
                } else {
                    todo.completed = false;
                    completedItems = completedItems.filter(item => item.todoId !== todo.id);
                    showToast('↩️ Task undone', 'success');
                }

                saveToStorage();
                renderTodos();
                renderCompleted();
            }

            // ----- DELETE TODO -----
            function deleteTodo(todoId) {
                const todo = todos.find(t => t.id === todoId);
                if (todo && todo.completed) {
                    completedItems = completedItems.filter(item => item.todoId !== todoId);
                }
                todos = todos.filter(t => t.id !== todoId);
                saveToStorage();
                renderTodos();
                renderCompleted();
                showToast('🗑️ Task deleted', 'success');
            }

            // ----- ADD TODO -----
            function addTodo() {
                const text = todoInput.value.trim();
                if (!text) {
                    showToast('Please enter a task.', 'error');
                    return;
                }
                if (countWords(text) > 250) {
                    showToast('Task exceeds 250 words limit!', 'error');
                    return;
                }

                todos.push({
                    id: nextTodoId++,
                    text: text,
                    completed: false
                });

                todoInput.value = '';
                updateTodoWordCounter();
                saveToStorage();
                renderTodos();
                renderCompleted();
                showToast('✅ Task added!', 'success');
            }

            // ----- RENDER COMPLETED -----
            function renderCompleted() {
                if (!completedContainer) return;
                if (completedItems.length === 0) {
                    completedContainer.innerHTML = '<div class="completed-empty">No completed tasks yet. Complete a lead or a to-do to see them here! ✅</div>';
                    return;
                }

                completedContainer.innerHTML = '';
                const sorted = [...completedItems].reverse();
                sorted.forEach((item) => {
                    const div = document.createElement('div');
                    div.className = 'completed-item';
                    div.innerHTML = `
                        <i class="fas fa-check-circle"></i>
                        <span class="item-text">${item.text}</span>
                        <span class="item-type">${item.type === 'lead' ? '📋 Lead' : '📝 To-Do'}</span>
                        <span style="font-size:0.7rem;color:#a0aec0;">${item.timestamp || ''}</span>
                    `;
                    completedContainer.appendChild(div);
                });
            }

            // ----- MESSAGE BUILDERS -----
            function buildLeadMessage(lead) {
                const status = lead.completed ? '✅ COMPLETED' : '⏳ PENDING';
                let msg = `📋 *Lead: ${lead.name || 'No name'}*\n`;
                msg += `📞 ${lead.phone || 'No phone'}\n`;
                msg += `📧 ${lead.email || 'No email'}\n`;
                msg += `📍 ${lead.address || 'No address'}\n`;
                msg += `🔗 ${lead.url || 'No URL'}\n`;
                msg += `🎯 ${lead.dropdown || 'No action'}\n`;
                if (lead.customDropdown) msg += `✏️ ${lead.customDropdown}\n`;
                if (lead.comment) msg += `💬 ${lead.comment}\n`;
                msg += `📊 ${status}`;
                return msg;
            }

            function buildTodoMessage(todo) {
                const status = todo.completed ? '✅ Completed' : '⬜ Pending';
                return `📝 *Personal Task*\n${todo.text}\n📊 ${status}`;
            }

            function buildGeneralMessage() {
                let message = '📝 *PERSONAL TO-DOS*\n━━━━━━━━━━━━━━━━━━\n';
                if (todos.length === 0) {
                    message += 'No personal tasks.\n';
                } else {
                    todos.forEach((todo) => {
                        const status = todo.completed ? '✅' : '⬜';
                        message += `   ${status} ${todo.text}\n`;
                    });
                }
                message += '\n✅ *COMPLETED TASKS*\n━━━━━━━━━━━━━━━━━━\n';
                if (completedItems.length === 0) {
                    message += 'No completed tasks yet.\n';
                } else {
                    completedItems.forEach((item) => {
                        message += `   ✅ ${item.text} (${item.type})\n`;
                    });
                }
                message += '\n📅 ' + new Date().toLocaleString();
                message += '\n📱 Sent via WebSwan';
                return message;
            }

            function openWhatsApp(rawNumber, message) {
                if (!rawNumber || !rawNumber.trim()) {
                    showToast('💬 No phone number on file!', 'error');
                    return;
                }
                const number = rawNumber.replace(/\s/g, '').replace(/^\+/, '');
                const url = `https://wa.me/${number}?text=${encodeURIComponent(message)}`;
                window.open(url, '_blank');
            }

            function openSMS(rawNumber, message) {
                const number = (rawNumber || '').replace(/\D/g, '') || OWNER_PHONE;
                const encoded = encodeURIComponent(message);
                const smsUrl = `sms:${number}?body=${encoded}`;
                try {
                    window.location.href = smsUrl;
                    showToast(`📱 Opening SMS to ${number}...`, 'success');
                } catch(e) {
                    const textarea = document.createElement('textarea');
                    textarea.value = message;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast('📋 Message copied to clipboard!', 'success');
                }
            }

            // ----- INDIVIDUAL LEAD SEND -----
            function sendLeadWhatsApp(leadId) {
                const lead = leads.find(l => l.id === leadId);
                if (!lead) return;
                openWhatsApp(lead.phone, buildLeadMessage(lead));
            }

            function sendLeadSMS(leadId) {
                const lead = leads.find(l => l.id === leadId);
                if (!lead) return;
                openSMS(lead.phone, buildLeadMessage(lead));
            }

            // ----- INDIVIDUAL TODO SEND (personal tasks go to your own number) -----
            function sendTodoWhatsApp(todoId) {
                const todo = todos.find(t => t.id === todoId);
                if (!todo) return;
                openWhatsApp(OWNER_PHONE, buildTodoMessage(todo));
            }

            function sendTodoSMS(todoId) {
                const todo = todos.find(t => t.id === todoId);
                if (!todo) return;
                openSMS(OWNER_PHONE, buildTodoMessage(todo));
            }

            // ----- GENERAL SEND (Personal To-Dos + Completed, together) -----
            function sendGeneralWhatsApp() {
                openWhatsApp(OWNER_PHONE, buildGeneralMessage());
            }

            function sendGeneralSMS() {
                openSMS(OWNER_PHONE, buildGeneralMessage());
            }

            // ----- BRIEFING (5000 words, own WhatsApp + manual-number SMS) -----
            function buildBriefingMessage() {
                let msg = '📄 *Briefing*\n━━━━━━━━━━━━━━━━━━\n';
                msg += briefingCommentEl.value.trim() ? briefingCommentEl.value : 'No briefing written yet.';
                msg += '\n\n📅 ' + new Date().toLocaleString();
                return msg;
            }

            function sendBriefingWhatsApp() {
                openWhatsApp(OWNER_PHONE, buildBriefingMessage());
            }

            // ----- PHONE NUMBER MODAL (manual SMS number entry) -----
            const phoneModalOverlay = document.getElementById('phoneModalOverlay');
            const phoneModalInput = document.getElementById('phoneModalInput');
            const phoneModalCancel = document.getElementById('phoneModalCancel');
            const phoneModalConfirm = document.getElementById('phoneModalConfirm');
            let pendingModalMessage = null;

            function openPhoneModal(message) {
                pendingModalMessage = message;
                phoneModalInput.value = '';
                phoneModalOverlay.classList.add('open');
                setTimeout(() => phoneModalInput.focus(), 50);
            }

            function closePhoneModal() {
                phoneModalOverlay.classList.remove('open');
                pendingModalMessage = null;
            }

            function sendBriefingSMS() {
                openPhoneModal(buildBriefingMessage());
            }

            // ----- FULL DAILY REPORT SMS (to 415-877-0687) -----
            function sendSMS() {
                let message = '📋 *WebSwan Daily Report* 📋\n\n';
                message += '━━━━━━━━━━━━━━━━━━\n';
                message += '📌 *LEADS*\n';
                message += '━━━━━━━━━━━━━━━━━━\n';
                
                if (leads.length === 0) {
                    message += 'No leads yet.\n';
                } else {
                    leads.forEach((lead, index) => {
                        const status = lead.completed ? '✅ COMPLETED' : '⏳ PENDING';
                        message += `\n${index + 1}. ${lead.name || 'No name'}\n`;
                        message += `   📞 ${lead.phone || 'No phone'}\n`;
                        message += `   📧 ${lead.email || 'No email'}\n`;
                        message += `   📍 ${lead.address || 'No address'}\n`;
                        message += `   🔗 ${lead.url || 'No URL'}\n`;
                        message += `   🎯 ${lead.dropdown || 'No action'}\n`;
                        if (lead.customDropdown) message += `   ✏️ ${lead.customDropdown}\n`;
                        if (lead.comment) message += `   💬 ${lead.comment}\n`;
                        message += `   📊 ${status}\n`;
                    });
                }

                message += '\n━━━━━━━━━━━━━━━━━━\n';
                message += '📝 *PERSONAL TO-DOS*\n';
                message += '━━━━━━━━━━━━━━━━━━\n';
                
                if (todos.length === 0) {
                    message += 'No personal tasks.\n';
                } else {
                    todos.forEach((todo, index) => {
                        const status = todo.completed ? '✅' : '⬜';
                        message += `   ${status} ${todo.text}\n`;
                    });
                }

                message += '\n━━━━━━━━━━━━━━━━━━\n';
                message += '✅ *COMPLETED TASKS*\n';
                message += '━━━━━━━━━━━━━━━━━━\n';
                
                if (completedItems.length === 0) {
                    message += 'No completed tasks yet.\n';
                } else {
                    completedItems.forEach((item) => {
                        message += `   ✅ ${item.text} (${item.type})\n`;
                    });
                }

                if (generalCommentEl.value.trim()) {
                    message += '\n━━━━━━━━━━━━━━━━━━\n';
                    message += '📖 *DAILY COMMENT*\n';
                    message += '━━━━━━━━━━━━━━━━━━\n';
                    message += generalCommentEl.value;
                }

                message += '\n\n━━━━━━━━━━━━━━━━━━\n';
                message += '📅 ' + new Date().toLocaleString();
                message += '\n📱 Sent via WebSwan';

                openSMS(OWNER_PHONE, message);
            }

            // ----- OTHER FUNCTIONS -----
            function addLead() {
                const newLead = {
                    id: nextId++,
                    name: '',
                    phone: '',
                    email: '',
                    address: '',
                    url: '',
                    dropdown: 're send email',
                    comment: '',
                    customDropdown: '',
                    completed: false
                };
                leads.push(newLead);
                saveToStorage();
                renderLeads();
                const cards = container.querySelectorAll('.lead-card');
                if (cards.length) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
                showToast('✅ New lead added!', 'success');
            }

            function clearAllData() {
                if (confirm('⚠️ Delete ALL data? This cannot be undone!')) {
                    localStorage.removeItem('webswan_leads');
                    localStorage.removeItem('webswan_todos');
                    localStorage.removeItem('webswan_completed');
                    localStorage.removeItem('webswan_general');
                    leads = [];
                    todos = [];
                    completedItems = [];
                    nextId = 1;
                    nextTodoId = 1;
                    generalCommentEl.value = '';
                    exitEditMode(false);
                    saveToStorage();
                    renderLeads();
                    renderTodos();
                    renderCompleted();
                    updateGeneralWordCounter();
                    showToast('🗑️ All data cleared.', 'success');
                }
            }

            function lockApp() {
                if (confirm('🔒 Lock the app? You\'ll need to unlock again.')) {
                    isUnlocked = false;
                    appContent.classList.remove('unlocked');
                    lockScreen.classList.remove('hidden');
                    resetFirstLock();
                    resetSecondLock();
                    firstLockContainer.style.display = 'block';
                    secondLockContainer.classList.remove('show');
                    secondLockContainer.style.display = 'none';
                    firstLockClicks = 0;
                    secondLockClicks = 0;
                    firstLockStatus.textContent = '🔒';
                    firstLockStatus.style.color = 'rgba(255,255,255,0.4)';
                    secondLockStatus.textContent = '🗝️';
                    secondLockStatus.style.color = 'rgba(255,255,255,0.4)';
                    secondLockEmoji.classList.remove('pulse');
                }
            }

            // ===== LANGUAGE + AI FILE (Lessons panel) =====
            const languageSelect = document.getElementById('languageSelect');
            const languageComment = document.getElementById('languageComment');
            const languageWordCount = document.getElementById('languageWordCount');
            const aiToolSelect = document.getElementById('aiToolSelect');
            const aiCategorySelect = document.getElementById('aiCategorySelect');
            const aiComment = document.getElementById('aiComment');
            const aiWordCount = document.getElementById('aiWordCount');
            const aiWhatsappBtn = document.getElementById('aiWhatsappBtn');

            function updateLanguageWordCounter() {
                const words = countWords(languageComment.value);
                languageWordCount.textContent = `${words} / 1000 words`;
                languageWordCount.style.color = words > 1000 ? '#b22222' : '#2c7da0';
            }

            function renderLanguage() {
                languageSelect.value = languageData.lang || 'English';
                languageComment.value = languageData.comment || '';
                updateLanguageWordCounter();
            }

            function updateAiWordCounter() {
                const words = countWords(aiComment.value);
                aiWordCount.textContent = `${words} / 1500 words`;
                aiWordCount.style.color = words > 1500 ? '#b22222' : '#2c7da0';
            }

            function renderAiTool() {
                if (!aiData[currentAiTool]) aiData[currentAiTool] = { category: 'Prompts', comment: '' };
                aiToolSelect.value = currentAiTool;
                aiCategorySelect.value = aiData[currentAiTool].category || 'Prompts';
                aiComment.value = aiData[currentAiTool].comment || '';
                updateAiWordCounter();
            }

            function wireLanguageAndAiFields() {
                languageSelect.addEventListener('change', (e) => {
                    languageData.lang = e.target.value;
                    saveToStorage();
                });

                languageComment.addEventListener('input', (e) => {
                    let words = e.target.value.trim().split(/\s+/).filter(w => w.length > 0);
                    if (words.length > 1000) {
                        e.target.value = words.slice(0, 1000).join(' ');
                    }
                    languageData.comment = e.target.value;
                    saveToStorage();
                    updateLanguageWordCounter();
                });

                aiToolSelect.addEventListener('change', (e) => {
                    currentAiTool = e.target.value;
                    saveToStorage();
                    renderAiTool();
                });

                aiCategorySelect.addEventListener('change', (e) => {
                    aiData[currentAiTool].category = e.target.value;
                    saveToStorage();
                });

                aiComment.addEventListener('input', (e) => {
                    let words = e.target.value.trim().split(/\s+/).filter(w => w.length > 0);
                    if (words.length > 1500) {
                        e.target.value = words.slice(0, 1500).join(' ');
                    }
                    aiData[currentAiTool].comment = e.target.value;
                    saveToStorage();
                    updateAiWordCounter();
                });

                aiWhatsappBtn.addEventListener('click', () => {
                    const entry = aiData[currentAiTool];
                    const message = `🤖 *AI File: ${currentAiTool}*\n📂 Type: ${entry.category}\n💬 ${entry.comment || 'No notes yet'}`;
                    openWhatsApp(OWNER_PHONE, message);
                });
            }

            // ===== TOGGLE LESSONS =====
            const toggleLessonsBtn = document.getElementById('toggleLessonsBtn');
            const lessonsContent = document.getElementById('lessonsContent');
            const lessonsBackBtn = document.getElementById('lessonsBackBtn');

            function openLessons() {
                lessonsContent.classList.add('open');
                toggleLessonsBtn.innerHTML = '<i class="fas fa-book-open"></i> Lessons';
                toggleLessonsBtn.classList.add('active');
            }

            function closeLessons() {
                lessonsContent.classList.remove('open');
                toggleLessonsBtn.innerHTML = '<i class="fas fa-book"></i> Lessons';
                toggleLessonsBtn.classList.remove('active');
            }

            toggleLessonsBtn.addEventListener('click', function() {
                if (lessonsContent.classList.contains('open')) {
                    closeLessons();
                } else {
                    openLessons();
                }
            });

            // "Back to Tasks" button inside the Lessons panel — closes Lessons and
